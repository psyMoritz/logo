<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff;font-family:'Inter',-apple-system,sans-serif;overflow:hidden}

.marquee-wrapper{
  width:100%;
  overflow:hidden;
  padding:24px 0;
  background:#fff;
  position:relative;
}

.marquee-wrapper::before,
.marquee-wrapper::after{
  content:'';
  position:absolute;
  top:0;
  width:120px;
  height:100%;
  z-index:2;
  pointer-events:none;
}
.marquee-wrapper::before{
  left:0;
  background:linear-gradient(to right, #fff 0%, transparent 100%);
}
.marquee-wrapper::after{
  right:0;
  background:linear-gradient(to left, #fff 0%, transparent 100%);
}

.marquee-track{
  display:flex;
  width:max-content;
  animation:scroll 25s linear infinite;
  align-items:center;
}

.marquee-track:hover{
  animation-play-state:paused;
}

@keyframes scroll{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

.logo-item{
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 32px;
  padding:16px 32px;
  border:1px solid #E8E8E6;
  border-radius:10px;
  background:#F9F9F8;
  height:80px;
  min-width:170px;
  transition:border-color 0.2s, background 0.2s;
}

.logo-item:hover{
  border-color:#1B4F8A;
  background:#EEF4FF;
}

.logo-item img{
  height:40px;
  width:auto;
  max-width:150px;
  object-fit:contain;
  filter:grayscale(100%);
  opacity:0.6;
  transition:filter 0.2s, opacity 0.2s;
}

.logo-item:hover img{
  filter:grayscale(0%);
  opacity:1;
}

.logo-item .fallback{
  font-size:15px;
  font-weight:500;
  color:#5F5E5A;
  display:none;
  white-space:nowrap;
}
</style>
</head>
<body>

<div class="marquee-wrapper">
  <div class="marquee-track" id="track"></div>
</div>

<script>
var companies = [
  {name: "Capgemini Invent",  file: "capgemini.png"},
  {name: "REWE",              file: "rewe.png"},
  {name: "GIZ",               file: "giz.png"},
  {name: "Land Sachsen-Anhalt", file: "sachsen-anhalt.png"},
  {name: "Deutsche Bahn",     file: "deutsche-bahn.png"},
  {name: "BearingPoint",      file: "bearingpoint.png"},
];

function buildItem(company) {
  var div = document.createElement('div');
  div.className = 'logo-item';
  div.title = company.name;

  var img = document.createElement('img');
  img.src = company.file;
  img.alt = company.name;

  var span = document.createElement('span');
  span.className = 'fallback';
  span.textContent = company.name;

  img.onerror = function() {
    this.style.display = 'none';
    span.style.display = 'block';
  };

  div.appendChild(img);
  div.appendChild(span);
  return div;
}

var track = document.getElementById('track');

// Erste Kopie
companies.forEach(function(c){ track.appendChild(buildItem(c)); });
// Zweite Kopie für nahtlosen Loop
companies.forEach(function(c){ track.appendChild(buildItem(c)); });
</script>

</body>
</html>
